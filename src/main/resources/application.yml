server:
  port: 8123
  servlet:
    context-path: /api
    #cookie 30天过期
    session:
      cookie:
        max-age: 2592000
spring:
  application:
    name: yu-picture-backend
  #激活的环境配置（敏感配置放在不提交 git 的 application-local.yml 中）
  profiles:
    active: local
  #数据库配置（url/username/password 等敏感信息放在 application-local.yml）
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
  #redis配置
#  redis:
#   database: 0
#   host: 192.168.150.101
#   port: 6379
#   password: 123321
#   timeout: 5000
  session:
    store-type: none
    #30天过期
    timeout: 2592000
  servlet:
    multipart:
      max-file-size: 10MB
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: false      #是否开启驼峰命名映射
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl    #仅在开发环境下打印日志
  global-config:
    db-config:
      logic-delete-field: isDelete   #全局逻辑删除的实体字段名
      logic-delete-value: 1          #逻辑已删除值（默认为1）
      logic-not-delete-value: 0      #逻辑未删除值（默认为0）
knife4j:
  enable: true
  openapi:
    title: 接口文档
    version: 1.0
    group:
      default:
        group-name: 分组名称
        api-rule: package
        api-rule-resources:
          - com.yupi.yupicturebackend.controller